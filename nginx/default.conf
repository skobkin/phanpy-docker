server {
	listen 80;
	listen [::]:80;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	location / {
		# Phanpy is a client-side application, so deep links need to fall back to index.html.
		try_files $uri $uri/ /index.html;
	}

	location ~* \.(?:css|js|mjs|json|ico|gif|jpe?g|png|svg|webp|woff2?)$ {
		# Built assets are content-addressed, so a long cache lifetime keeps the image lightweight on repeat visits.
		expires 7d;
		add_header Cache-Control "public, max-age=604800, immutable";
		try_files $uri =404;
	}
}
