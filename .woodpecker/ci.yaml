clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      depth: 1

steps:
  - name: prepare-release
    image: alpine:3.23
    environment:
      DOCKERHUB_IMAGE_REPO: ${DOCKERHUB_IMAGE_REPO}
      GHCR_IMAGE_REPO: ${GHCR_IMAGE_REPO}
      GHCR_LOGIN:
        from_secret: GHCR_LOGIN
      GHCR_TOKEN:
        from_secret: GHCR_TOKEN
    commands:
      - apk add --no-cache curl jq
      - sh ci/prepare-release.sh
    when:
      - event: manual
      - event: cron
        cron: daily-release-check

  - name: publish-image
    image: woodpeckerci/plugin-docker-buildx:6
    privileged: true
    depends_on:
      - prepare-release
    environment:
      DOCKERHUB_IMAGE_REPO: ${DOCKERHUB_IMAGE_REPO}
      GHCR_IMAGE_REPO: ${GHCR_IMAGE_REPO}
      PHANPY_BUILD_ENV:
        from_secret: PHANPY_BUILD_ENV
    settings:
      repo:
        - ${DOCKERHUB_IMAGE_REPO}
        - ${GHCR_IMAGE_REPO}
      dockerfile: Dockerfile
      tags_file: .woodpecker/tags.txt
      env_file: .woodpecker/release.env
      build_args_from_env:
        - PHANPY_VERSION
      secrets:
        - id=phanpy_env,env=PHANPY_BUILD_ENV
      cache_images:
        - ${DOCKERHUB_IMAGE_REPO}:buildcache
        - ${GHCR_IMAGE_REPO}:buildcache
      platforms:
        - linux/amd64
        - linux/arm64
      logins:
        - registry: https://index.docker.io/v1/
          username:
            from_secret: DOCKERHUB_LOGIN
          password:
            from_secret: DOCKERHUB_TOKEN
        - registry: https://ghcr.io
          username:
            from_secret: GHCR_LOGIN
          password:
            from_secret: GHCR_TOKEN
    commands:
      - . .woodpecker/release.env
      - |
        if [ "${SHOULD_BUILD}" != "1" ]; then
          echo "Skipping Docker build because ${PHANPY_VERSION} is already published."
          exit 0
        fi
      - |
        for candidate in plugin-docker-buildx /bin/plugin-docker-buildx /usr/local/bin/plugin-docker-buildx; do
          if command -v "${candidate}" >/dev/null 2>&1; then
            exec "${candidate}"
          fi
          if [ -x "${candidate}" ]; then
            exec "${candidate}"
          fi
        done
        echo "Could not find the plugin-docker-buildx executable in the buildx plugin image." >&2
        exit 1
    when:
      - event: manual
      - event: cron
        cron: daily-release-check
